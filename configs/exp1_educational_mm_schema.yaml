paths:
  report_dir: reports/exp1_educational_mm_schema
  sample_dir: data/educational_mm/schema_samples

datasets:
  scienceqa:
    resources_csv: data/scienceqa/processed/resources.csv
    sample_size: 200
    random_seed: 42
  tqa:
    raw_dir: data/tqa/raw
    hf_dataset: notefill/ck12-tqa-instruction
    sample_size: 200
    max_scan: 8000
    random_seed: 42
    status: hf_streaming
  ai2d:
    raw_dir: data/ai2d/raw
    hf_dataset: lmms-lab/ai2d-no-mask
    split: test
    sample_size: 200
    max_scan: 1000
    random_seed: 42
    status: hf_streaming

schema:
  columns:
    - dataset
    - sample_id
    - original_id
    - split
    - question
    - choices
    - answer
    - text_context
    - image_ref
    - has_image
    - subject
    - topic
    - skill
    - evidence_type
    - modality_case
    - answer_format
    - source_task
